services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api
    ports:
      - "443:443"
    env_file:
      - .env
    depends_on:
      - my-redis
      - db_lojaKiller

  my-redis:
    image: redis:alpine
    container_name: my-redis

  db_lojaKiller:
    image: mysql:latest
    container_name: db_lojaKiller
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: filipe39
    volumes:
      - /var/lib/docker/volumes/3fc608435918246711233322cd6a83272d818f6c323461b8313c1b8dc40871bc/_data:/var/lib/mysql